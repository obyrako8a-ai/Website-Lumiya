<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма регистрации</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>
</head>
    
<body class="form-page">
    <!-- Шапка -->
    <nav class="main-nav">
        <a href="index.html">Люмия</a>
        <a href="about.html">О фабрике</a>
        <a href="events.html">Мероприятия</a>
        <a href="shop.html">Магазин</a>
    </nav>

    <!-- Форма регистрации -->
    <div class="form-container">
        <form class="registration-form" id="registrationForm">
            <h1 class="form-title">Регистрация на мероприятие</h1>
            
            <!-- ФИО (Имя и Фамилия) -->
            <div class="name-row">
                <div class="form-group">
                    <label for="firstname">Имя</label>
                    <input type="text" id="firstname" name="firstname" placeholder="Введите ваше имя" required>
                </div>
                <div class="form-group">
                    <label for="lastname">Фамилия</label>
                    <input type="text" id="lastname" name="lastname" placeholder="Введите вашу фамилию" required>
                </div>
            </div>
            
            <!-- Телефон -->
            <div class="form-group">
                <label for="phone">Номер телефона</label>
                <input type="tel" id="phone" name="phone" placeholder="+7 (XXX) XXX-XX-XX" required>
            </div>
            
            <!-- Email -->
            <div class="form-group">
                <label for="email">Электронная почта</label>
                <input type="email" id="email" name="email" placeholder="example@mail.ru" required>
            </div>
            
            <!-- Тип мероприятия -->
            <div class="form-group">
                <label for="event">Выберите мероприятие</label>
                <select id="event" name="event" required>
                    <option value="" disabled selected>– Выберите мероприятие –</option>
                    <option value="masterclass">Мастер-класс по созданию игрушек</option>
                    <option value="excursion">Экскурсия по фабрике</option>
                    <option value="exhibition">Выставка новых коллекций</option>
                    <option value="kids">Детский праздник</option>
                </select>
            </div>
            
            <button type="submit" class="submit-btn">Зарегистрироваться</button>
        </form>
    </div>
